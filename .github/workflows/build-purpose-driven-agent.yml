name: Build Purpose-Driven Agent

on:
  push:
    branches: [main]
    paths:
      - "src/purpose_driven_agent/**"
      - "src/aos_mcp_servers/**"
      - "Dockerfile.aos-agent"
      - ".github/workflows/build-purpose-driven-agent.yml"
  repository_dispatch:
    types: [manifest-update]
  workflow_dispatch:

concurrency:
  group: purpose-driven-agent-build
  cancel-in-progress: false

jobs:
  build:
    permissions:
      id-token: write
      contents: read
    uses: ASISaga/aos-infra/.github/workflows/aos-agent-build.yml@main
    with:
      trigger:         "${{ github.event_name == 'repository_dispatch' && 'rebase' || 'source-change' }}"
      layer_number:    "2"
      layer_name:      "purpose-driven-agent"
      image:           "aos/purpose-driven-agent"
      parent_image:    "${{ vars.AOS_INFRA_IMAGE }}"
      package_dir:     "purpose_driven_agent"
      package_module:  "purpose_driven_agent"
      repo_name:       "ASISaga/purpose-driven-agent"
      src_path:        "src/purpose_driven_agent"
      extra_src_paths: "src/aos_mcp_servers"
      parent_digest:   "${{ github.event.client_payload.parent_digest || '' }}"
      breaking_candidate: "${{ github.event.client_payload.breaking_candidate || 'false' }}"
    secrets:
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      DEPLOY_DISPATCH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}

  dispatch-downstream:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Dispatch manifest-update to leadership-agent
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
        run: |
          gh api repos/ASISaga/leadership-agent/dispatches \
            --method POST \
            --field event_type=manifest-update \
            --field client_payload='{"parent_image":"aos/purpose-driven-agent","parent_digest":"${{ needs.build.outputs.digest }}","parent_sha":"${{ github.sha }}","breaking_candidate":"false"}'
