name: CI

on:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov

      - name: Run unit pytest
        run: |
          pytest tests/unit/ -v --asyncio-mode=auto \
            --cov=purpose_driven_agent \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report-unit
          path: coverage.xml

  integration-tests:
    name: Integration tests (agent_framework-gated)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Detect agent_framework availability
        id: framework-check
        run: |
          if python -c "import importlib.util,sys; sys.exit(0 if importlib.util.find_spec('agent_framework') else 1)"; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration pytest
        if: steps.framework-check.outputs.available == 'true'
        run: |
          pytest tests/integration/ -v --asyncio-mode=auto

      - name: Skip integration pytest
        if: steps.framework-check.outputs.available != 'true'
        run: echo "Skipping integration tests: agent_framework not available."

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pylint

      - name: Run Pylint
        run: |
          pylint src/purpose_driven_agent \
            --output-format=text \
            --fail-under=7.0

      - name: Save Pylint report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pylint-report
          path: pylint-report.txt
